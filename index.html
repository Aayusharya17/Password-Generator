<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1e1e2f;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #2c2c3e;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    h2 {
      margin-bottom: 15px;
    }

    .password-box {
      display: flex;
      margin-bottom: 10px;
    }

    .password-box input {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 5px 0 0 5px;
      outline: none;
    }

    .password-box button {
      padding: 8px;
      border: none;
      background: #00c853;
      color: white;
      cursor: pointer;
      border-radius: 0 5px 5px 0;
    }

    .options {
      text-align: left;
      margin: 10px 0;
    }

    .options label {
      display: block;
      margin: 5px 0;
    }

    .generate-btn {
      width: 100%;
      padding: 10px;
      background: #2979ff;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    .generate-btn:hover {
      background: #000000;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Password Generator</h2>

  <div class="password-box">
    <input type="text" id="password" readonly>
    <button onclick="copyPassword()">Copy</button>
  </div>

  <div class="options">
    <label>Password Length: <span id="lengthValue">8</span></label>
    <input type="range" id="length" min="4" max="20" value="8">

    <label><input type="checkbox" id="uppercase" checked> Uppercase</label>
    <label><input type="checkbox" id="lowercase" checked> Lowercase</label>
    <label><input type="checkbox" id="numbers" checked> Numbers</label>
    <label><input type="checkbox" id="symbols"> Symbols</label>
  </div>

  <button class="generate-btn" onclick="generatePassword()">Generate Password</button>
</div>

<script>
  const lengthSlider = document.getElementById("length");
  const lengthValue = document.getElementById("lengthValue");

  lengthSlider.addEventListener("input", () => {
    lengthValue.textContent = lengthSlider.value;
  });

  function generatePassword() {
    const length = lengthSlider.value;
    const includeUpper = document.getElementById("uppercase").checked;
    const includeLower = document.getElementById("lowercase").checked;
    const includeNumbers = document.getElementById("numbers").checked;
    const includeSymbols = document.getElementById("symbols").checked;

    const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const lower = "abcdefghijklmnopqrstuvwxyz";
    const numbers = "0123456789";
    const symbols = "!@#$%^&*()_+[]{}|;:,.<>?";

    let allChars = "";
    if (includeUpper) allChars += upper;
    if (includeLower) allChars += lower;
    if (includeNumbers) allChars += numbers;
    if (includeSymbols) allChars += symbols;

    if (allChars === "") {
      alert("Select at least one option!");
      return;
    }

    let password = "";
    for (let i = 0; i < length; i++) {
      const randomIndex = Math.floor(Math.random() * allChars.length);
      password += allChars[randomIndex];
    }

    document.getElementById("password").value = password;
  }

  function copyPassword() {
    const passwordField = document.getElementById("password");
    passwordField.select();
    document.execCommand("copy");
    alert("Password copied!");
  }
</script>

</body>
</html>
